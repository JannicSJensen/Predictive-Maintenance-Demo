azure_event_hub:
  filter:
    include_domains:
      - binary_sensor
      - sensor
      - climate
      - light
      - switch
    include_entity_globs:
      - binary_sensor.*_motion
      - binary_sensor.*_occupancy
      - sensor.*_temperature
      - sensor.*_humidity
      - sensor.*_power*
      - sensor.*_energy*
    include_entities:
      - sensor.home_power_consumption
      - sensor.grid_energy_price
      - climate.office
      - climate.living_room
      - light.hallway
      - switch.media_center
    exclude_domains:
      - camera
      - media_player
      - alarm_control_panel
      - lock
